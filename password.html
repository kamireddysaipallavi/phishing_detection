<!DOCTYPE html>
<html>
<head>
<title>Password Checker - TRUSTA</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/nav.js"></script>
<style>
.pwd-wrap{position:relative;margin:10px 0;}
.pwd-wrap input[type=password], .pwd-wrap input[type=text]{
  display:block!important;width:100%!important;
  padding:12px 45px 12px 15px!important;
  border-radius:8px!important;border:1px solid #30363d!important;
  background:white!important;color:#e6edf3!important;
  font-size:15px!important;box-sizing:border-box!important;margin:0!important;
}
.pwd-wrap input:focus{outline:none!important;border-color:#1abc9c!important;}
.eye-btn{position:absolute!important;right:12px!important;top:50%!important;
  transform:translateY(-50%)!important;background:none!important;
  border:none!important;color:#8b949e!important;cursor:pointer!important;
  font-size:16px!important;padding:0!important;width:auto!important;margin:0!important;}
.str-bar{width:100%;background:white;border-radius:6px;height:8px;margin:10px 0 4px;}
.str-fill{height:8px;border-radius:6px;transition:all 0.3s;}
.chk{display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid #21262d;font-size:14px;}
.chk.pass{color:#1abc9c;}.chk.fail{color:#484f58;}
.tips-box{background:whitesmoke;border:1px solid black;
  border-radius:10px;padding:14px 18px;margin-top:16px;}
.tips-box p{color:#1abc9c;font-weight:700;margin-bottom:8px;}
.tips-box ul{padding-left:20px;}
.tips-box ul li{color:#8b949e;font-size:14px;margin:5px 0;}
</style>
</head>
<body>
<div class="navbar" id="navbar"></div>

<div class="page-wrapper">
  <div class="content-box">
    <h2>🔑 Password Strength Checker</h2>
    <p style="color:#8b949e;margin-bottom:16px;">Check how strong your password is.</p>

    <div class="pwd-wrap">
      <input type="password" id="pwdInput" placeholder="Type your password here..." oninput="checkPwd()">
      <button class="eye-btn" type="button" onclick="toggleEye()">👁️</button>
    </div>

    <div class="str-bar"><div class="str-fill" id="strFill" style="width:0%"></div></div>
    <p id="strLabel" style="font-weight:700;font-size:16px;min-height:22px;margin-bottom:12px;"></p>
    <div id="chkList"></div>
    <div id="tipBox"></div>
  </div>
</div>

<script>
const common = ["password","123456","password123","admin","letmein","qwerty","abc123","111111","iloveyou","12345678","000000","pass123","welcome","monkey","dragon"];

function toggleEye() {
  const inp = document.getElementById('pwdInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function checkPwd() {
  const pwd = document.getElementById('pwdInput').value;
  if (!pwd) {
    document.getElementById('chkList').innerHTML = '';
    document.getElementById('strFill').style.width = '0%';
    document.getElementById('strLabel').innerText = '';
    document.getElementById('tipBox').innerHTML = '';
    return;
  }
  const checks = [
    { t: 'At least 8 characters', p: pwd.length >= 8 },
    { t: 'At least 12 characters (recommended)', p: pwd.length >= 12 },
    { t: 'Contains uppercase (A-Z)', p: /[A-Z]/.test(pwd) },
    { t: 'Contains lowercase (a-z)', p: /[a-z]/.test(pwd) },
    { t: 'Contains number (0-9)', p: /[0-9]/.test(pwd) },
    { t: 'Contains special character (!@#$%^&*)', p: /[!@#$%^&*()\-_=+]/.test(pwd) },
    { t: 'Not a common password', p: !common.includes(pwd.toLowerCase()) },
    { t: 'No repeated characters (aaa, 111)', p: !/(.)\1{2,}/.test(pwd) },
  ];
  const score = checks.filter(c => c.p).length;
  const pct = Math.round(score / checks.length * 100);
  const colors = ['#f85149','#f85149','#e3b341','#e3b341','#1abc9c','#1abc9c','#1abc9c','#1abc9c'];
  const labels = ['Very Weak 🔴','Weak 🔴','Fair 🟡','Moderate 🟡','Strong 🟢','Strong 🟢','Very Strong 🟢','Excellent 🟢'];

  document.getElementById('strFill').style.width = pct + '%';
  document.getElementById('strFill').style.background = colors[score] || '#1abc9c';
  document.getElementById('strLabel').style.color = colors[score] || '#1abc9c';
  document.getElementById('strLabel').innerText = labels[score] || 'Excellent 🟢';

  document.getElementById('chkList').innerHTML = checks.map(c =>
    `<div class="chk ${c.p?'pass':'fail'}">${c.p?'✅':'❌'} ${c.t}</div>`
  ).join('');

  const tips = [];
  if (!checks[0].p) tips.push('Use at least 8 characters');
  if (!checks[1].p) tips.push('Use 12+ characters for better security');
  if (!checks[2].p) tips.push('Add uppercase letters (A-Z)');
  if (!checks[3].p) tips.push('Add lowercase letters (a-z)');
  if (!checks[4].p) tips.push('Add numbers (0-9)');
  if (!checks[5].p) tips.push('Add special characters like !@#$%');
  if (!checks[6].p) tips.push("Avoid common passwords like 'password123'");
  if (!checks[7].p) tips.push("Avoid repeating characters like 'aaa' or '111'");

  document.getElementById('tipBox').innerHTML = tips.length > 0
    ? `<div class="tips-box"><p>💡 Tips to improve:</p><ul>${tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`
    : `<div style="background:#0a1a0f;border:1px solid #1abc9c;border-radius:10px;padding:14px 18px;color:#1abc9c;font-weight:700;margin-top:16px;">🛡️ Excellent password! Very hard to crack.</div>`;
}

window.onload = function() { initPage(false); }
function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
</script>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</body>
</html>
